services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: serveiq
      POSTGRES_PASSWORD: serveiq
      POSTGRES_DB: serveiq
    ports:
      - "5432:5432"
    volumes:
      - serveiq_postgres:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  serveiq_postgres:
